services:
  greenfield-backend:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /app
    volumes:
      - ./greenfield-backend:/app:z
      - maven-cache:/root/.m2:z
    command: mvn spring-boot:run
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker

  greenfield-frontend:
    image: node:22
    working_dir: /app
    volumes:
      - ./greenfield-frontend:/app:z
      - /app/node_modules
    command: ["/bin/sh", "-c", "npm install && npm run dev -- --host 0.0.0.0"]
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  maven-cache:

networks:
  default:
    driver: bridge
