services:
  brownfield-backend:
    image: node:22
    working_dir: /app
    volumes:
      - ./brownfield-backend:/app:z
      - /app/node_modules
    command: ["/bin/sh", "-c", "npm install && npm run dev"]
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development

  brownfield-frontend:
    image: node:22
    working_dir: /app
    volumes:
      - ./brownfield-frontend:/app:z
      - /app/node_modules
    command: ["/bin/sh", "-c", "npm install && npm run dev -- --host 0.0.0.0"]
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true

networks:
  default:
    driver: bridge
